services:
  postgres:
    image: postgres:16-alpine
    container_name: helix-postgres
    environment:
      POSTGRES_DB: helix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - helix-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: helix-redis
    ports:
      - "6379:6379"
    volumes:
      - helix-redis-data:/data

volumes:
  helix-postgres-data:
  helix-redis-data:
